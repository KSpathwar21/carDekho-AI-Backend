server:
  port: ${PORT:8080}

spring:
  application:
    name: carDekho-ai-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://reseau.proxy.rlwy.net:40413/railway}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-opus-4-8}

  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.carDekhoAI: INFO

cors:
  allowed-origins: ${FRONTEND_ORIGIN:http://localhost:5173}
